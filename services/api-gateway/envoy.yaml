admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
    # ---------------------------------------------------------------------
    # HTTP listener (public entrypoint)
    #   - REST routes per service
    #   - gRPC-Web bridge for browser clients
    # ---------------------------------------------------------------------
    - name: listener_http
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8080
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: logify_gateway
                codec_type: AUTO
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: logify_backend
                      domains: ["*"]
                      cors:
                        allow_origin_string_match:
                          - safe_regex:
                              regex: ".*"
                        allow_methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
                        allow_headers: "authorization,content-type,x-grpc-web,x-user-agent,x-requested-with,x-tenant-id,x-project-id"
                        expose_headers: "grpc-status,grpc-message"
                        max_age: "1728000"
                      routes:
                        # Health check
                        - match: { path: "/healthz" }
                          direct_response:
                            status: 200
                            body:
                              inline_string: "ok"

                        # ---- REST routes ----
                        - match: { prefix: "/v1/auth" }
                          route: { cluster: auth_service, timeout: 15s }
                        - match: { prefix: "/v1/users" }
                          route: { cluster: user_service, timeout: 15s }
                        - match: { prefix: "/v1/projects" }
                          route: { cluster: project_service, timeout: 15s }
                        - match: { prefix: "/v1/tenants" }
                          route: { cluster: tenant_service, timeout: 15s }
                        - match: { prefix: "/v1/search" }
                          route: { cluster: search_service, timeout: 30s }
                        - match: { prefix: "/v1/notifications" }
                          route: { cluster: notification_service, timeout: 15s }
                        - match: { prefix: "/v1/ingest" }
                          route: { cluster: ingest_service, timeout: 30s }
                        - match: { prefix: "/v1/logs" }
                          route: { cluster: log_processor_service, timeout: 30s }
                        - match: { prefix: "/v1/dashboard" }
                          route: { cluster: dashboard_service, timeout: 15s }

                        # ---- gRPC-Web routes (browser → backend gRPC) ----
                        - match: { prefix: "/user." }
                          route: { cluster: user_service_grpc, timeout: 0s, max_stream_duration: { grpc_timeout_header_max: 0s } }
                        - match: { prefix: "/auth." }
                          route: { cluster: auth_service_grpc, timeout: 0s, max_stream_duration: { grpc_timeout_header_max: 0s } }
                        - match: { prefix: "/project." }
                          route: { cluster: project_service_grpc, timeout: 0s, max_stream_duration: { grpc_timeout_header_max: 0s } }
                        - match: { prefix: "/tenant." }
                          route: { cluster: tenant_service_grpc, timeout: 0s, max_stream_duration: { grpc_timeout_header_max: 0s } }
                        - match: { prefix: "/search." }
                          route: { cluster: search_service_grpc, timeout: 0s, max_stream_duration: { grpc_timeout_header_max: 0s } }

                http_filters:
                  - name: envoy.filters.http.grpc_web
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_web.v3.GrpcWeb
                  - name: envoy.filters.http.cors
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  # -----------------------------------------------------------------------
  # Clusters: one HTTP cluster per service + one gRPC cluster per service
  # -----------------------------------------------------------------------
  clusters:
    # ---- HTTP clusters ----
    - name: user_service
      connect_timeout: 2s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: user_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address: { socket_address: { address: user-service, port_value: 8081 } }

    - name: auth_service
      connect_timeout: 2s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: auth_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address: { socket_address: { address: auth-service, port_value: 8082 } }

    - name: project_service
      connect_timeout: 2s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: project_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address: { socket_address: { address: project-service, port_value: 8083 } }

    - name: tenant_service
      connect_timeout: 2s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: tenant_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address: { socket_address: { address: tenant-service, port_value: 8084 } }

    - name: search_service
      connect_timeout: 2s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: search_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address: { socket_address: { address: search-service, port_value: 8085 } }

    - name: notification_service
      connect_timeout: 2s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: notification_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address: { socket_address: { address: notification-service, port_value: 8086 } }

    - name: ingest_service
      connect_timeout: 2s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: ingest_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address: { socket_address: { address: ingest-service, port_value: 8087 } }

    - name: log_processor_service
      connect_timeout: 2s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: log_processor_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address: { socket_address: { address: log-processor-service, port_value: 8088 } }

    - name: dashboard_service
      connect_timeout: 2s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: dashboard_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address: { socket_address: { address: dashboard-service, port_value: 8090 } }

    # ---- gRPC clusters (HTTP/2) ----
    - name: user_service_grpc
      connect_timeout: 2s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: user_service_grpc
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address: { socket_address: { address: user-service, port_value: 50051 } }

    - name: auth_service_grpc
      connect_timeout: 2s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: auth_service_grpc
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address: { socket_address: { address: auth-service, port_value: 50052 } }

    - name: project_service_grpc
      connect_timeout: 2s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: project_service_grpc
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address: { socket_address: { address: project-service, port_value: 50053 } }

    - name: tenant_service_grpc
      connect_timeout: 2s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: tenant_service_grpc
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address: { socket_address: { address: tenant-service, port_value: 50054 } }

    - name: search_service_grpc
      connect_timeout: 2s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: search_service_grpc
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address: { socket_address: { address: search-service, port_value: 50055 } }
