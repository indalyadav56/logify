syntax = "proto3";

package user;

option go_package = "github.com/indalyadav56/logify/services/user-service/internal/transport/grpc/user";

service UserService {
  rpc GetUserByEmail (GetUserByEmailRequest) returns (GetUserByEmailResponse);
  rpc CreateUser (CreateUserRequest) returns (CreateUserResponse);
}

message GetUserByEmailRequest {
  string email = 1;
}

message GetUserByEmailResponse {
  string id = 1;
  string email = 2;
  string hashed_password = 3;
  string first_name = 4;
  string tenant_id = 5;
}

message CreateUserRequest {
  string first_name = 1;
  string middle_name = 2;
  string last_name = 3;
  string email = 4;
  string password = 5;
}

message CreateUserResponse {
  string id = 1;
  string tenant_id = 2;
  string email = 3;
}

