syntax = "proto3";

package project;

option go_package = "github.com/indalyadav56/logify/services/project-service/internal/transport/grpc/proto";

service ProjectService {
  rpc GetProjectIDs (GetProjectIDsRequest) returns (GetProjectIDsResponse);
}

message GetProjectIDsRequest {
  string user_id = 1;
}

message GetProjectIDsResponse {
  repeated string project_ids = 1;
  string user_id = 2;
  string tenant_id = 3;
}
