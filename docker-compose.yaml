  #   restart: "no"
  #   environment:
  #     APP_ENV: ${APP_ENV:-dev}
  #     APP_DATABASE_HOST: postgres
  #     APP_DATABASE_PORT: "5432"
  #     APP_DATABASE_USER: ${POSTGRES_USER:-postgres}
  #     APP_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
  #     APP_DATABASE_NAME: ${POSTGRES_DB:-logify}
  #     APP_CLICKHOUSE_DSN: "clickhouse://${CLICKHOUSE_USER:-default}:${CLICKHOUSE_PASSWORD:-mypassword}@clickhouse:9000/${CLICKHOUSE_DB:-logify}?dial_timeout=5s&read_timeout=3s"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     clickhouse:
  #       condition: service_healthy
  #   networks:
  #     - logify-net

  # ── Web Frontend ───────────────────────────────────────
  # web:
  #   profiles: ["app"]
  #   build:
  #     context: .
  #     dockerfile: deployments/docker/Dockerfile.web
  #   container_name: logify_web
  #   restart: unless-stopped
  #   ports:
  #     - "${WEB_PORT:-3000}:80"
  #   depends_on:
  #     backend:
  #       condition: service_started
  #   networks:
  #     - logify-net
  #   logging:
  #     driver: json-file
  #     options:
  #       max-size: "10m"
  #       max-file: "3"

  # ========================================================
  # Dev Tools (--profile dev)
  # ========================================================

  # ── Kafka UI ───────────────────────────────────────────
  kafka-ui:
    profiles: ["dev"]
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: logify_kafka_ui
    restart: unless-stopped
    ports:
      - "${KAFKA_UI_PORT:-8085}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: logify-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - logify-net
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  debezium:
    image: debezium/connect:2.5
    depends_on:
      - kafka
      - postgres
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1

      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses

      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1

  # debezium-ui:
  #   image: debezium/debezium-ui:2.5
  #   depends_on:
  #     - debezium
  #   ports:
  #     - "8081:8080"
  #   environment:
  #     KAFKA_CONNECT_URIS: http://connect:8083


# ========================================================
# Volumes
# ========================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  kafka_data:
    driver: local
  clickhouse_data:
    driver: local
  clickhouse_logs:
    driver: local
  minio_data:
    driver: local

# ========================================================
# Networks
# ========================================================
networks:
  logify-net:
    driver: bridge
