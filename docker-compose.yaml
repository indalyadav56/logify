# ============================================================
# Logify – Docker Compose
# ============================================================
# Usage:
#   docker compose up -d                    # infrastructure only
#   docker compose --profile app up -d      # infra + app services
#   docker compose --profile dev up -d      # infra + dev tools (kafka-ui)
#   docker compose --profile app --profile dev up -d  # everything
# ============================================================

services:
  # ========================================================
  # Infrastructure
  # ========================================================

  # ── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: logify_postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-logify}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - logify-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-logify}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: logify_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    networks:
      - logify-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Kafka (KRaft – no Zookeeper) ──────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: logify_kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_BROKER_PORT:-9092}:9092"
      - "${KAFKA_EXTERNAL_PORT:-29092}:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:${KAFKA_EXTERNAL_PORT:-29092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - logify-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── ClickHouse ─────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:26.2-alpine
    container_name: logify_clickhouse
    restart: unless-stopped
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-mypassword}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-logify}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    networks:
      - logify-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================================
  # Application Services (--profile app)
  # ========================================================

  # ── Backend API ────────────────────────────────────────
  backend:
    profiles: ["app"]
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: logify_backend
    restart: on-failure:5
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SERVER_PORT: "8080"
      APP_DATABASE_HOST: postgres
      APP_DATABASE_PORT: "5432"
      APP_DATABASE_USER: ${POSTGRES_USER:-postgres}
      APP_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      APP_DATABASE_NAME: ${POSTGRES_DB:-logify}
      APP_KAFKA_BROKERS: kafka:9092
      APP_CLICKHOUSE_DSN: "clickhouse://${CLICKHOUSE_USER:-default}:${CLICKHOUSE_PASSWORD:-mypassword}@clickhouse:9000/${CLICKHOUSE_DB:-logify}?dial_timeout=5s&read_timeout=3s"
      APP_REDIS_ADDR: redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - logify-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ── Worker (Kafka consumer → ClickHouse) ───────────────
  worker:
    profiles: ["app"]
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: logify_worker
    restart: on-failure:5
    entrypoint: ["./worker"]
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_KAFKA_BROKERS: kafka:9092
      APP_CLICKHOUSE_DSN: "clickhouse://${CLICKHOUSE_USER:-default}:${CLICKHOUSE_PASSWORD:-mypassword}@clickhouse:9000/${CLICKHOUSE_DB:-logify}?dial_timeout=5s&read_timeout=3s"
      APP_REDIS_ADDR: redis:6379
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - logify-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ── Migrator (run once) ────────────────────────────────
  migrator:
    profiles: ["app"]
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: logify_migrator
    entrypoint: ["./server", "migrate"]
    restart: "no"
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_DATABASE_HOST: postgres
      APP_DATABASE_PORT: "5432"
      APP_DATABASE_USER: ${POSTGRES_USER:-postgres}
      APP_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      APP_DATABASE_NAME: ${POSTGRES_DB:-logify}
      APP_CLICKHOUSE_DSN: "clickhouse://${CLICKHOUSE_USER:-default}:${CLICKHOUSE_PASSWORD:-mypassword}@clickhouse:9000/${CLICKHOUSE_DB:-logify}?dial_timeout=5s&read_timeout=3s"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - logify-net

  # ── Web Frontend ───────────────────────────────────────
  # web:
  #   profiles: ["app"]
  #   build:
  #     context: .
  #     dockerfile: deployments/docker/Dockerfile.web
  #   container_name: logify_web
  #   restart: unless-stopped
  #   ports:
  #     - "${WEB_PORT:-3000}:80"
  #   depends_on:
  #     backend:
  #       condition: service_started
  #   networks:
  #     - logify-net
  #   logging:
  #     driver: json-file
  #     options:
  #       max-size: "10m"
  #       max-file: "3"

  # ========================================================
  # Dev Tools (--profile dev)
  # ========================================================

  # ── Kafka UI ───────────────────────────────────────────
  kafka-ui:
    profiles: ["dev"]
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: logify_kafka_ui
    restart: unless-stopped
    ports:
      - "${KAFKA_UI_PORT:-8085}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: logify-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - logify-net
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

# ========================================================
# Volumes
# ========================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  kafka_data:
    driver: local
  clickhouse_data:
    driver: local
  clickhouse_logs:
    driver: local

# ========================================================
# Networks
# ========================================================
networks:
  logify-net:
    driver: bridge
