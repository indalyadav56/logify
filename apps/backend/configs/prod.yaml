app:
  environment: "production"

databases:
  clickhouse:
    driver: clickhouse
    dsn: "clickhouse://default:mypassword@clickhouse.prod.internal:9000/logify?dial_timeout=5s&read_timeout=3s"

clients:
  user_service:
    target: "dns:///user-service.prod.internal:9090"
    tls:
      ca_cert_file: "/etc/certs/ca.crt"
      cert_file: "/etc/certs/client.crt"
      key_file:  "/etc/certs/client.key"
  payment_service:
    retry:
      max_attempts: 2             # ← stricter retries for $$$ in prod
    circuit_breaker:
      threshold: 30

postgres:
  primary:
    host: "postgres-primary.prod.internal"
    password: "${POSTGRES_PASSWORD}"
    max_open_conns: 100
    max_idle_conns: 25

redis:
  host: "redis.prod.internal"
  password: "${REDIS_PASSWORD}"
  tls_enabled: true
  pool_size: 100

kafka:
  brokers:
    - "kafka.prod.internal:9092"

telemetry:
  tracing:
    enabled: true
    endpoint: "http://otel-collector.prod:4317"
    sample_rate: 0.05             # ← 5% in prod
  logging:
    level: "warn"                 # ← reduce log volume

rate_limit:
  default:
    requests_per_second: 5000
    burst: 1000