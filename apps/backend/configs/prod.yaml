app:
  name: "logify-backend"
  version: "1.0.0"

logger:
  level: info
  format: json
  output: both
  file:
    filename: ./logs/logify.log
    max_size: 100
    max_backups: 5
    max_age: 30
    compress: true

server:
  http:
    host: "0.0.0.0"
    port: 8080
    read_timeout: 10s
    write_timeout: 15s
    idle_timeout: 60s
  
  grpc:
    host: "0.0.0.0"
    port: 9090
    reflection: false
    max_recv_msg_size: 4194304
    max_send_msg_size: 4194304
    keepalive:
      max_connection_idle: 60s
      max_connection_age: 300s
      time: 30s
      timeout: 10s

jwt:
  secret: ""
  issuer: "logify"
  access_token_ttl: 60m
  refresh_token_ttl: 720h   # 30 days

postgres:
  host: "localhost"
  user: ""
  password: ""
  database: "logify"
  port: 5432
  ssl_mode: "disable"
  max_open_conns: 25
  max_idle_conns: 10
  conn_max_lifetime: 5m
  conn_max_idle_time: 1m

redis:
  host: "localhost"
  password: ""
  tls_enabled: false
  port: 6379
  db: 0
  dial_timeout: 3s
  read_timeout: 1s
  write_timeout: 1s
  pool_size: 20
  min_idle_conns: 5

kafka:
  brokers:
    - "localhost:9092"

clickhouse:
  host: "localhost"
  port: 9000
  database: "logify"
  user: ""
  password: ""
  secure: false
  max_open_conns: 25
  max_idle_conns: 10
  conn_max_lifetime: 5m
  conn_max_idle_time: 1m

ollama:
  host: "http://localhost:11434"
  model: "qwen3-embedding:8b"
  timeout: 60s
