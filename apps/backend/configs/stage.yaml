app:
  environment: "staging"

databases:
  clickhouse:
    driver: clickhouse
    dsn: "clickhouse://default:mypassword@clickhouse.stage.internal:9000/logify?dial_timeout=5s&read_timeout=3s"

clients:
  user_service:
    target: "dns:///user-service.stage.internal:9090"
    tls:
      ca_cert_file: "/etc/certs/ca.crt"
      cert_file: "/etc/certs/client.crt"
      key_file:  "/etc/certs/client.key"

postgres:
  primary:
    host: "postgres-primary.stage.internal"
    password: "${POSTGRES_PASSWORD}"
    max_open_conns: 50

redis:
  host: "redis.stage.internal"
  password: "${REDIS_PASSWORD}"
  tls_enabled: true
  pool_size: 50

kafka:
  brokers:
    - "kafka.stage.internal:9092"

telemetry:
  tracing:
    enabled: true
    endpoint: "http://otel-collector.stage:4317"
    sample_rate: 0.5              # ← 50% in staging
  logging:
    level: "info"