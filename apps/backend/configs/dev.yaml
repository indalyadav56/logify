server:
  port: "8080"
  read_timeout: "10s"
  write_timeout: "10s"
  idle_timeout: "60s"

database:
  host: "localhost"
  port: "5432"
  user: "postgres"
  password: "postgres"
  name: "logify"
  ssl_mode: "disable"
  max_open_conns: 25
  max_idle_conns: 25
