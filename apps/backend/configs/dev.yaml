app:
  environment: "development"

databases:
  clickhouse:
    driver: clickhouse
    dsn: "clickhouse://default:mypassword@clickhouse.dev.internal:9000/logify?dial_timeout=5s&read_timeout=3s"

clients:
  user_service:
    target: "dns:///user-service.dev.internal:9090"
    tls:
      ca_cert_file: "/etc/certs/ca.crt"

postgres:
  primary:
    host: "postgres-primary.dev.internal"
    password: "${POSTGRES_PASSWORD}"

redis:
  host: "redis.dev.internal"
  password: "${REDIS_PASSWORD}"
  tls_enabled: true

kafka:
  brokers:
    - "kafka.dev.internal:9092"

