  level: "info"

admin:
  email: "admin@example.com"
  password: "change_me"

kafka:
  brokers:
    - "localhost:29092"

clickhouse_dsn: "clickhouse://default:mypassword@localhost:9000/logify?dial_timeout=5s&read_timeout=3s"